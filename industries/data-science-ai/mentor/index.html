<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/icons/favicon.png">
  <title>Ask Mentor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']]
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-a: #f0f2ff;
      --bg-b: #e8ecff;
      --panel: rgba(255,255,255,0.88);
      --panel-border: rgba(148,163,184,0.2);
      --text: #0f172a;
      --muted: #64748b;
      --accent: #6366f1;
      --accent-2: #8b5cf6;
      --accent-3: #06b6d4;
      --user-grad: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      --bot-bg: rgba(255,255,255,0.97);
      --shadow-lg: 0 24px 64px rgba(99,102,241,0.16);
      --shadow-card: 0 4px 24px rgba(99,102,241,0.10);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;

      /* Section color palette */
      --col-intuition:   #f59e0b;
      --col-steps:       #10b981;
      --col-math:        #6366f1;
      --col-takeaways:   #ec4899;
      --col-default:     #06b6d4;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(ellipse at 0% 0%, rgba(99,102,241,0.14) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 0%, rgba(139,92,246,0.12) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 100%, rgba(6,182,212,0.08) 0%, transparent 50%),
        linear-gradient(160deg, #f0f2ff 0%, #e8ecff 100%);
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.25); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.45); }

    /* ─── Shell ─── */
    .shell {
      min-height: 100vh;
      height: 100vh;
      display: flex;
      flex-direction: column;
      width: min(1320px, 100%);
      margin: 0 auto;
      padding: clamp(16px, 2.4vw, 28px) clamp(18px, 4.2vw, 56px);
      gap: 14px;
    }

    /* ─── Hero ─── */
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      border-radius: var(--radius-xl);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow-lg);
    }
    .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .brand-mark {
      width: 50px; height: 50px;
      border-radius: 16px;
      background: var(--user-grad);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 8px 24px rgba(99,102,241,0.32);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .brand-mark::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
    }
    .brand-copy { min-width: 0; }
    .eyebrow {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 2px;
    }
    h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.025em; line-height: 1.2; }
    .subtitle { font-size: 0.8rem; color: var(--muted); margin-top: 3px; }
    .close-btn {
      border: none; border-radius: 99px;
      padding: 10px 18px; font-size: 12px; font-weight: 700;
      cursor: pointer; color: #fff; font-family: inherit;
      background: var(--user-grad);
      box-shadow: 0 8px 20px rgba(99,102,241,0.26);
      transition: transform 0.18s, box-shadow 0.18s;
      flex-shrink: 0; letter-spacing: 0.01em;
    }
    .close-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(99,102,241,0.32); }

    /* ─── Chat Frame ─── */
    .chat-frame {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      border-radius: var(--radius-xl);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    /* ─── Messages ─── */
    .messages {
      flex: 1; min-height: 0;
      overflow-y: auto;
      padding: 24px;
      padding-bottom: 28px;
      display: flex; flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
    }

    /* ─── Intro ─── */
    .intro-panel {
      width: min(900px, 100%);
      margin: auto;
      display: flex; flex-direction: column;
      align-items: center; gap: 24px;
      padding: 16px 0;
    }
    .intro-icon {
      width: 200px; height: 200px;
      object-fit: contain;
      filter: drop-shadow(0 16px 28px rgba(99,102,241,0.2));
    }
    .intro-title {
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #000;
      text-align: center; line-height: 1.15;
      padding: 0 16px;
    }
    .intro-title .prep-highlight { color: #ff0000; }
    .intro-cards {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 198px));
      gap: 22px;
      align-items: stretch;
      justify-content: center;
    }
    .intro-card {
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 20px;
      background:
        radial-gradient(circle at 88% 14%, rgba(99,102,241,0.14), transparent 48%),
        linear-gradient(155deg, rgba(255,255,255,0.98), rgba(240,245,255,0.95));
      padding: 16px 14px;
      min-height: 132px;
      box-shadow:
        0 12px 28px rgba(99,102,241,0.1),
        inset 0 1px 0 rgba(255,255,255,0.94);
      font-size: 14.2px;
      font-weight: 600;
      line-height: 1.5;
      opacity: 0; transform: translateY(10px) scale(0.985);
      animation: introReveal 0.45s cubic-bezier(0.2,0.8,0.2,1) forwards;
      cursor: pointer;
      color: var(--text);
      font-family: inherit;
      text-align: left;
      letter-spacing: 0.01em;
      transition: transform 0.22s, box-shadow 0.22s, border-color 0.22s;
      position: relative;
      overflow: hidden;
    }
    .intro-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(99,102,241,0.12), rgba(6,182,212,0.1));
      opacity: 0;
      transition: opacity 0.22s;
      pointer-events: none;
    }
    .intro-card:hover {
      transform: translateY(-5px) scale(1.01);
      box-shadow: 0 18px 38px rgba(99,102,241,0.18), inset 0 1px 0 rgba(255,255,255,0.92);
      border-color: rgba(99,102,241,0.42);
    }
    .intro-card:hover::after { opacity: 1; }
    .intro-card.active {
      border-color: rgba(99,102,241,0.5);
      box-shadow: 0 14px 32px rgba(99,102,241,0.18), 0 0 0 2px rgba(99,102,241,0.15);
    }
    .intro-card:focus-visible {
      outline: none;
      border-color: rgba(99,102,241,0.62);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2), 0 14px 32px rgba(99,102,241,0.18);
    }
    .intro-card:nth-child(1) { animation-delay: 0.06s; }
    .intro-card:nth-child(2) { animation-delay: 0.20s; }
    .intro-card:nth-child(3) { animation-delay: 0.34s; }
    .intro-card:nth-child(4) { animation-delay: 0.48s; }
    @keyframes introReveal {
      from { opacity: 0; transform: translateY(10px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── Message Row ─── */
    .message {
      display: flex; gap: 10px; align-items: flex-end;
      max-width: min(860px, 100%);
      animation: msgIn 0.3s cubic-bezier(0.2,0.8,0.2,1) both;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot  { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 11px; font-weight: 800;
      background: var(--user-grad);
      box-shadow: 0 6px 18px rgba(99,102,241,0.22);
      flex-shrink: 0; letter-spacing: 0.01em;
    }
    .avatar.bot-av { background: linear-gradient(135deg, #0ea5e9, #6366f1); }

    /* ─── Bubble ─── */
    .bubble {
      padding: 13px 16px;
      border-radius: var(--radius-lg);
      line-height: 1.65; font-size: 14px;
      word-break: break-word;
      box-shadow: 0 4px 16px rgba(15,23,42,0.06);
    }
    .message.user .bubble {
      background: var(--user-grad);
      color: #fff;
      border-bottom-right-radius: 5px;
      white-space: pre-wrap;
    }
    .message.bot .bubble {
      background: var(--bot-bg);
      color: var(--text);
      border: 1px solid rgba(99,102,241,0.10);

      border-bottom-left-radius: 5px;
      padding: 0; overflow: hidden;
    }
    .bubble-plain {
      padding: 13px 16px;
      white-space: pre-wrap;
    }

    /* ─── Markdown in bubbles ─── */
    .md-h1, .md-h2, .md-h3 {
      font-weight: 800; letter-spacing: -0.015em; line-height: 1.25;
      margin: 8px 0 6px;
    }
    .md-h1 { font-size: 1.22rem; }
    .md-h2 { font-size: 1.10rem; }
    .md-h3 { font-size: 1.00rem; }
    strong { font-weight: 700; }
    em { font-style: italic; }

    /* ─── Premium Card ─── */
    .premium-card {
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px 14px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 60%, #06b6d4 100%);
      position: relative; overflow: hidden;
    }
    .card-header::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .card-header-eyebrow {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.7); margin-bottom: 4px;
      position: relative;
    }
    .premium-title {
      font-size: 1.15rem; font-weight: 800;
      letter-spacing: -0.02em; color: #fff;
      position: relative; line-height: 1.25;
    }
    .card-header-meta {
      position: relative;
      margin-top: 6px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.86);
      letter-spacing: 0.01em;
    }

    /* ─── Vertical Sections ─── */
    .section-stack {
      background: #fff;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .section-accordion {
      border-radius: 14px;
      border: 1px solid var(--sec-border, rgba(148,163,184,0.24));
      background: var(--sec-bg, rgba(248,250,252,0.88));
      overflow: hidden;
      box-shadow: 0 6px 16px rgba(15,23,42,0.06);
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .section-accordion[open] {
      border-color: var(--sec-border-open, rgba(99,102,241,0.4));
      box-shadow: 0 10px 22px rgba(99,102,241,0.11);
    }
    .section-summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      background: var(--sec-head-bg, rgba(255,255,255,0.68));
      border-bottom: 1px solid transparent;
    }
    .section-accordion[open] .section-summary {
      border-bottom-color: var(--sec-border, rgba(148,163,184,0.24));
    }
    .section-summary::-webkit-details-marker { display: none; }
    .section-summary-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .section-badge {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      background: var(--sec-pill, rgba(99,102,241,0.18));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }
    .section-heading-text {
      font-size: 13px;
      font-weight: 800;
      color: #1e293b;
      line-height: 1.35;
      letter-spacing: 0.01em;
    }
    .section-caret {
      color: #475569;
      font-size: 12px;
      transform: rotate(-90deg);
      transition: transform 0.18s;
      flex-shrink: 0;
    }
    .section-accordion[open] .section-caret { transform: rotate(0deg); }
    .section-content {
      padding: 14px 14px 16px;
      font-size: 13.5px;
      line-height: 1.65;
    }

    /* ─── Math Block ─── */
    .math-block {
      margin: 12px 0;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, #f8f7ff 0%, #f0f4ff 100%);
      border: 1px solid rgba(99,102,241,0.18);
      padding: 16px 18px;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .math-block .mjx-chtml,
    .math-block .MathJax {
      font-size: 1.08em !important;
    }
    .math-block mjx-container[display="true"] {
      min-width: max-content;
    }
    .math-inline {
      white-space: normal;
      color: #4f46e5;
      font-style: normal;
    }

    /* ─── Code Block ─── */
    .code-block-wrap {
      margin: 10px 0;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid rgba(15,23,42,0.12);
    }
    .code-block-header {
      background: #1e2435;
      padding: 8px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .code-block-lang {
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em;
      color: #94a3b8; text-transform: uppercase;
    }
    .copy-btn {
      border: 1px solid rgba(148,163,184,0.25);
      border-radius: 5px; background: rgba(255,255,255,0.08);
      color: #94a3b8; font-size: 10.5px; font-weight: 600;
      padding: 3px 9px; cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.14); color: #e2e8f0; }
    .copy-btn.copied { color: #34d399; border-color: rgba(52,211,153,0.3); }
    .code-block-wrap pre {
      margin: 0; border-radius: 0;
    }
    .code-block-wrap pre code {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 12.5px !important; line-height: 1.6 !important;
    }

    /* ─── Key Fact Block ─── */
    .key-fact {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      margin: 8px 0;
      background: linear-gradient(135deg, #fefce8, #fef9c3);
      border: 1px solid rgba(234,179,8,0.25);
    }
    .key-fact .kf-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .key-fact .kf-text { font-size: 13px; line-height: 1.55; font-weight: 500; }

    /* ─── Takeaway List ─── */
    .takeaway-list { list-style: none; display: flex; flex-direction: column; gap: 8px; padding: 0; margin: 0; }
    .takeaway-list li {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 13px; line-height: 1.55;
    }
    .takeaway-list li .check {
      width: 18px; height: 18px; border-radius: 5px;
      background: linear-gradient(135deg, #ec4899, #f43f5e);
      color: #fff; font-size: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }

    /* ─── Step List ─── */
    .step-list { counter-reset: step; list-style: none; display: flex; flex-direction: column; gap: 12px; padding: 0; margin: 0; }
    .step-list li {
      display: flex; align-items: flex-start; gap: 12px;
      font-size: 13px; line-height: 1.6;
      counter-increment: step;
    }
    .step-list li .step-num {
      width: 22px; height: 22px; border-radius: 7px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff; font-size: 11px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .step-list li .step-num::before { content: counter(step); }

    /* ─── Composer ─── */
    .composer {
      position: sticky; bottom: 0; z-index: 5;
      padding: 16px 18px;
      border-top: 1px solid rgba(148,163,184,0.14);
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .composer-inner {
      display: flex; gap: 10px; align-items: flex-end;
      padding: 10px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(148,163,184,0.18);
      box-shadow: 0 8px 24px rgba(99,102,241,0.08);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .composer-inner:focus-within {
      border-color: rgba(99,102,241,0.4);
      box-shadow: 0 8px 24px rgba(99,102,241,0.14), 0 0 0 3px rgba(99,102,241,0.07);
    }
    .mode-switcher {
      position: relative;
      flex-shrink: 0;
      align-self: center;
    }
    .mode-chip {
      border: 1px solid rgba(99,102,241,0.28);
      background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(6,182,212,0.12));
      color: #1e293b;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      padding: 9px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      line-height: 1;
      transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
      white-space: nowrap;
      max-width: 176px;
    }
    .mode-chip:hover {
      transform: translateY(-1px);
      border-color: rgba(99,102,241,0.46);
      box-shadow: 0 8px 20px rgba(99,102,241,0.14);
    }
    .mode-chip:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.18), 0 8px 20px rgba(99,102,241,0.14);
    }
    .mode-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6366f1;
      box-shadow: 0 0 0 4px rgba(99,102,241,0.14);
      flex-shrink: 0;
    }
    .mode-chip-label {
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mode-caret {
      font-size: 10px;
      opacity: 0.75;
      margin-left: 1px;
    }
    .mode-switcher.open .mode-caret {
      transform: rotate(180deg);
    }
    .mode-menu {
      position: absolute;
      left: 0;
      bottom: calc(100% + 10px);
      min-width: 190px;
      border-radius: 14px;
      border: 1px solid rgba(99,102,241,0.18);
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 20px 38px rgba(15,23,42,0.14);
      padding: 8px;
      display: none;
      flex-direction: column;
      gap: 6px;
      z-index: 40;
    }
    .mode-switcher.open .mode-menu {
      display: flex;
      animation: modeMenuIn 0.2s ease both;
    }
    @keyframes modeMenuIn {
      from { opacity: 0; transform: translateY(6px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .mode-option {
      border: 1px solid rgba(148,163,184,0.24);
      border-radius: 10px;
      background: #fff;
      color: #1e293b;
      font: inherit;
      font-size: 12.5px;
      font-weight: 650;
      text-align: left;
      cursor: pointer;
      padding: 9px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: border-color 0.16s, transform 0.16s, box-shadow 0.16s;
    }
    .mode-option:hover {
      transform: translateY(-1px);
      border-color: rgba(99,102,241,0.38);
      box-shadow: 0 8px 16px rgba(99,102,241,0.11);
    }
    .mode-option.selected {
      border-color: rgba(99,102,241,0.56);
      background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(6,182,212,0.12));
      box-shadow: 0 6px 16px rgba(99,102,241,0.14);
    }
    textarea {
      flex: 1; border: none; resize: none;
      min-height: 52px; max-height: 180px;
      font: inherit; font-size: 14px; line-height: 1.5;
      color: var(--text); background: transparent; outline: none;
      padding: 8px 6px;
    }
    textarea::placeholder { color: #94a3b8; }
    .send-btn {
      width: 44px; height: 44px; border: none;
      border-radius: 14px; cursor: pointer; color: #fff; font-family: inherit;
      background: var(--user-grad);
      box-shadow: 0 8px 20px rgba(99,102,241,0.28);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
      flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(99,102,241,0.34); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ─── Typing ─── */
    .typing-row {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; color: var(--muted);
      font-size: 13px; font-style: italic;
    }
    .typing-dots {
      display: flex; gap: 4px; align-items: center;
    }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      animation: typingPulse 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingPulse {
      0%, 60%, 100% { opacity: 0.25; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1); }
    }

    /* ─── Toast ─── */
    .mode-toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(12px);
      background: rgba(15,23,42,0.92);
      color: #f8fafc;
      border: 1px solid rgba(148,163,184,0.28);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.01em;
      box-shadow: 0 10px 26px rgba(15,23,42,0.26);
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      max-width: min(92vw, 620px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mode-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .explain-selection-btn {
      position: fixed;
      z-index: 90;
      border: 1px solid rgba(99,102,241,0.3);
      background: linear-gradient(135deg, rgba(99,102,241,0.96), rgba(6,182,212,0.96));
      color: #fff;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      padding: 6px 12px;
      box-shadow: 0 10px 24px rgba(30,41,59,0.24);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 8px);
      transition: opacity 0.16s ease, transform 0.16s ease;
      white-space: nowrap;
    }
    .explain-selection-btn.show {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, 0);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Responsive ─── */
    @media (max-width: 900px) {
      .intro-cards { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .shell { padding: 12px; gap: 10px; }
      .messages { padding: 14px; }
      .composer { padding: 12px 14px; }
      .bubble { font-size: 13px; }
      .composer-inner { align-items: center; }
      .mode-chip { max-width: 140px; padding: 8px 10px; }
      .mode-menu { min-width: 166px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="chat-frame">
      <div class="messages" id="messages">
        <div class="intro-panel" id="introPanel">
          <img class="intro-icon" src="../../../icons/mentor.png" alt="" />
          <div class="intro-title">How's your <span class="prep-highlight">prep</span> going?</div>
          <div class="intro-cards">
            <button type="button" class="intro-card" data-mode="deepdive">Deep dive into this</button>
            <button type="button" class="intro-card" data-mode="interviewready">How to answer this in an interview</button>
            <button type="button" class="intro-card" data-mode="followups">Follow-up questions that can be asked after this</button>
            <button type="button" class="intro-card" data-mode="quickrevision">Key points to remember for quick revision</button>
          </div>
        </div>
      </div>
      <div class="composer">
        <div class="composer-inner">
          <div class="mode-switcher" id="modeSwitcher">
            <button class="mode-chip" id="modeChip" type="button" aria-expanded="false" aria-controls="modeMenu">
              <span class="mode-dot" id="modeDot"></span>
              <span class="mode-chip-label" id="modeChipLabel">Deep dive</span>
              <span class="mode-caret">▾</span>
            </button>
            <div class="mode-menu" id="modeMenu"></div>
          </div>
          <textarea id="promptInput" placeholder="Ask anything about the topic..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" type="button" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>
  </div>
  <div class="mode-toast" id="modeToast" aria-live="polite"></div>
  <button type="button" class="explain-selection-btn" id="explainSelectionBtn">✦Explain</button>

  <script>
    const params = new URLSearchParams(window.location.search);
    const subjectLabel = params.get('subject') || 'Data Science';
    const messagesEl = document.getElementById('messages');
    const introPanelEl = document.getElementById('introPanel');
    const inputEl = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const modeSwitcherEl = document.getElementById('modeSwitcher');
    const modeChipEl = document.getElementById('modeChip');
    const modeChipLabelEl = document.getElementById('modeChipLabel');
    const modeDotEl = document.getElementById('modeDot');
    const modeMenuEl = document.getElementById('modeMenu');
    const modeToastEl = document.getElementById('modeToast');
    const explainSelectionBtnEl = document.getElementById('explainSelectionBtn');
    const modeCards = Array.from(document.querySelectorAll('.intro-card[data-mode]'));
    const history = [];
    const GROQ_MODELS = [
      'llama-3.3-70b-versatile',
      'llama-3.1-8b-instant',
      'gemma2-9b-it',
      'meta-llama/llama-4-scout-17b-16e-instruct',
      'meta-llama/llama-4-maverick-17b-128e-instruct',
      'deepseek-r1-distill-llama-70b'
    ];
    const MODE_OPTIONS = [
      { id: 'deepdive', label: 'Deep dive', icon: '🧠', color: '#6366f1' },
      { id: 'interviewready', label: 'Interview-ready', icon: '🎯', color: '#10b981' },
      { id: 'followups', label: 'Follow-ups', icon: '❓', color: '#ec4899' },
      { id: 'quickrevision', label: 'Quick revision', icon: '⚡', color: '#f59e0b' }
    ];
    let activeMode = 'deepdive';
    let toastTimer = null;
    let explainSelectedText = '';

    const BASE_SYSTEM_PROMPT = `You are Mentor, a warm but brutally clear expert for Data Science interview prep.\n\nYou must produce practical, high-quality, interview-usable answers.\n\nGlobal rules:\n- If the question is ambiguous, state assumptions explicitly\n- Avoid fluff and generic motivational text\n- Use precise technical language where needed\n- Keep content high signal and readable with line breaks\n- If code is needed, ALWAYS output fenced code blocks with the correct language tag\n- For mathematical text, STRICTLY use LaTeX only: inline $...$ and block $$...$$\n\nFormatting rules:\n- Output VALID JSON only\n- No markdown fences around the JSON itself\n- Do not output any text outside JSON\n- Escape newlines as \\n\nJSON schema (strict):\n{\n  "title": "Short topic from user's exact question",\n  "sections": [\n    {"heading": "...", "content": "..."}\n  ]\n}`;

    const MODE_PROMPT_MAP = {
      deepdive: `Mode: Deep dive\n\nReturn exactly 1 section with heading exactly: "Deep dive"\n\nStyle requirements:\n- Explain from first principles\n- Assume zero prior knowledge\n- Cover all related subtopics and intuition\n- Provide examples wherever helpful\n- Be comprehensive but readable\n- For math, use strict LaTeX only: inline $...$ and block $$...$$\n- If code is required, use fenced code blocks with correct language tags`,
      interviewready: `Mode: Interview-ready\n\nReturn exactly 1 section with heading exactly: "Interview-ready"\n\nStyle requirements:\n- Provide a precise, structured answer exactly as the user should speak in an interview\n- Use line-by-line format with concise, confident statements\n- Avoid unnecessary explanations\n- Keep the response directly usable as spoken interview content\n- For math, use strict LaTeX only: inline $...$ and block $$...$$\n- If code is required, use fenced code blocks with correct language tags`,
      followups: `Mode: Follow-ups\n\nReturn exactly 1 section with heading exactly: "Follow-ups"\n\nStyle requirements:\n- Generate only follow-up questions\n- Use strictly numbered format (1., 2., 3., ...)\n- Do not include answers\n- Keep each question sharp and interview-relevant`,
      quickrevision: `Mode: Quick revision\n\nReturn exactly 1 section with heading exactly: "Quick revision"\n\nStyle requirements:\n- Provide crisp bullet points only\n- Include only key facts, formulas, and takeaways\n- Optimize for fast recall during exams\n- Keep items short and high signal\n- For formulas, use strict LaTeX only: inline $...$ and block $$...$$`
    };

    function buildSystemPrompt(modeId) {
      const modePrompt = MODE_PROMPT_MAP[modeId] || MODE_PROMPT_MAP.deepdive;
      return `${BASE_SYSTEM_PROMPT}\n\n${modePrompt}`;
    }

    const EXPLANATION_SYSTEM_PROMPT = `You are Mentor. The user has selected a specific text span and wants a direct explanation.\n\nInstructions:\n- Ignore all mode-specific section instructions\n- Explain only the selected text deeply but clearly\n- Use concise bullets where helpful\n- Support markdown bold and LaTeX math when relevant\n\nOutput rules:\n- Output VALID JSON only\n- No markdown fences\n- No text outside JSON\n- Escape newlines as \\n\nRequired JSON schema:\n{\n  "title": "Explanation",\n  "sections": [\n    {\n      "heading": "Explanation",\n      "content": "Detailed explanation of selected text"\n    }\n  ]\n}`;

    /* ── Escape HTML ── */
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    /* ── Section type detector ── */
    function detectSectionType(heading) {
      const h = heading.toLowerCase();
      if (h.includes('intuit') || h.includes('concept') || h.includes('overview') || h.includes('idea'))
        return 'intuition';
      if (h.includes('step') || h.includes('how') || h.includes('process') || h.includes('guide') || h.includes('detail'))
        return 'step';
      if (h.includes('math') || h.includes('formula') || h.includes('equation') || h.includes('proof') || h.includes('derivat'))
        return 'math';
      if (h.includes('takeaway') || h.includes('summary') || h.includes('key') || h.includes('conclusion') || h.includes('tip'))
        return 'takeaway';
      return 'default';
    }

    const SECTION_META = {
      intuition:  { icon: '💡', color: '#f59e0b', label: 'Intuition' },
      step:       { icon: '📋', color: '#10b981', label: 'Steps'     },
      math:       { icon: '∑',  color: '#6366f1', label: 'Math'      },
      takeaway:   { icon: '✅', color: '#ec4899', label: 'Takeaways' },
      default:    { icon: '📌', color: '#06b6d4', label: 'Details'   }
    };

    function repairJsonText(text) {
      let result = '';
      let inString = false;
      let escaped = false;

      for (const ch of text) {
        if (inString) {
          if (escaped) {
            result += ch;
            escaped = false;
            continue;
          }

          if (ch === '\\') {
            result += ch;
            escaped = true;
            continue;
          }

          if (ch === '"') {
            result += ch;
            inString = false;
            continue;
          }

          if (ch === '\n') {
            result += '\\n';
            continue;
          }

          if (ch === '\r') {
            continue;
          }

          if (ch === '\t') {
            result += ' ';
            continue;
          }

          result += ch;
          continue;
        }

        result += ch;
        if (ch === '"') {
          inString = true;
        }
      }

      return result.replace(/,\s*([}\]])/g, '$1');
    }

    function parseStructuredPayload(raw) {
      if (!raw) return null;

      if (typeof raw === 'object') {
        return raw;
      }

      const source = String(raw).trim();
      const unfenced = source
        .replace(/^```json\s*/i, '')
        .replace(/^```\s*/i, '')
        .replace(/\s*```$/, '')
        .trim();

      function tryParse(value) {
        try {
          return JSON.parse(value);
        } catch (_) {
          return null;
        }
      }

      function extractFirstJsonBlock(text) {
        const start = text.search(/[\[{]/);
        if (start < 0) return null;

        const opener = text[start];
        const closer = opener === '{' ? '}' : ']';
        let depth = 0;
        let inString = false;
        let escaped = false;

        for (let i = start; i < text.length; i++) {
          const ch = text[i];

          if (inString) {
            if (escaped) {
              escaped = false;
              continue;
            }
            if (ch === '\\') {
              escaped = true;
              continue;
            }
            if (ch === '"') {
              inString = false;
            }
            continue;
          }

          if (ch === '"') {
            inString = true;
            continue;
          }

          if (ch === opener) depth++;
          if (ch === closer) {
            depth--;
            if (depth === 0) {
              return text.slice(start, i + 1);
            }
          }
        }

        return null;
      }

      if (unfenced.startsWith('"') && unfenced.endsWith('"')) {
        try {
          const unwrapped = JSON.parse(unfenced);
          return parseStructuredPayload(unwrapped);
        } catch (_) {
          // Ignore and continue with standard extraction.
        }
      }

      const direct = tryParse(unfenced);
      if (direct && typeof direct === 'object') return direct;
      if (typeof direct === 'string') return parseStructuredPayload(direct);

      // Handle heavily escaped JSON strings that are not valid direct JSON.
      const unescaped = unfenced
        .replace(/\\\"/g, '"')
        .replace(/\\n/g, '\n')
        .replace(/\\t/g, '\t');

      const directUnescaped = tryParse(unescaped);
      if (directUnescaped && typeof directUnescaped === 'object') return directUnescaped;
      if (typeof directUnescaped === 'string') return parseStructuredPayload(directUnescaped);

      const candidateSearchSpace = [unfenced, unescaped];
      for (const text of candidateSearchSpace) {
        const candidate = extractFirstJsonBlock(text);
        if (!candidate) continue;

        const parsedCandidate = tryParse(candidate) || tryParse(repairJsonText(candidate));
        if (parsedCandidate && typeof parsedCandidate === 'object') {
          return parsedCandidate;
        }
      }

      return null;
    }

    function normalizeStructuredResponse(data) {
      const parsed = typeof data === 'string' ? parseStructuredPayload(data) : data;

      if (typeof parsed === 'string') {
        return normalizeStructuredResponse(parseStructuredPayload(parsed));
      }

      if (!parsed || typeof parsed !== 'object') return null;

      const wrapped = parsed.response || parsed.data || parsed.result || parsed.answer;
      if (wrapped && (typeof wrapped === 'object' || typeof wrapped === 'string')) {
        return normalizeStructuredResponse(wrapped);
      }

      let sectionsSource = parsed.sections || parsed.Sections || parsed.sectionList || parsed.items;
      if (!Array.isArray(sectionsSource) && sectionsSource && typeof sectionsSource === 'object') {
        sectionsSource = Object.values(sectionsSource);
      }

      if (Array.isArray(sectionsSource) && sectionsSource.length) {
        return {
          title: String(parsed.title || parsed.heading || 'Mentor Response'),
          sections: sectionsSource
            .filter(Boolean)
            .map((sec, index) => ({
              heading: String(sec.heading || sec.title || `Section ${index + 1}`),
              content: typeof sec.content === 'string'
                ? sec.content
                : (sec.content == null ? '' : (typeof sec.content === 'object' ? JSON.stringify(sec.content, null, 2) : String(sec.content)))
            }))
        };
      }

      if (Object.prototype.hasOwnProperty.call(parsed, 'heading') ||
          Object.prototype.hasOwnProperty.call(parsed, 'content')) {
        return {
          title: String(parsed.title || parsed.heading || 'Mentor Response'),
          sections: [{
            heading: String(parsed.heading || parsed.title || 'Details'),
            content: typeof parsed.content === 'string'
              ? parsed.content
              : (parsed.content == null ? '' : String(parsed.content))
          }]
        };
      }

      // Last-resort conversion: turn object keys into titled sections.
      const objectEntries = Object.entries(parsed)
        .filter(([key]) => key !== 'title')
        .filter(([, value]) => value != null)
        .map(([key, value]) => ({
          heading: String(key),
          content: typeof value === 'string' ? value : JSON.stringify(value, null, 2)
        }));

      if (objectEntries.length) {
        return {
          title: String(parsed.title || 'Mentor Response'),
          sections: objectEntries
        };
      }

      if (Array.isArray(parsed)) {
        const sections = parsed
          .filter(Boolean)
          .map((item, index) => ({
            heading: String(item.heading || item.title || `Section ${index + 1}`),
            content: typeof item.content === 'string'
              ? item.content
              : (item.content == null ? '' : String(item.content))
          }));

        if (sections.length) {
          return {
            title: 'Mentor Response',
            sections
          };
        }
      }

      return null;
    }

    function recoverStructuredFromText(rawText) {
      const text = String(rawText || '').trim();
      if (!text) return null;

      // Try to salvage sections even from truncated JSON.
      const sectionMatches = [...text.matchAll(/"heading"\s*:\s*"([^"]+)"\s*,\s*"content"\s*:\s*"([\s\S]*?)(?="\s*}\s*,|"\s*}\s*]|"\s*}\s*$)/g)];
      if (sectionMatches.length) {
        const sections = sectionMatches.map((m) => ({
          heading: (m[1] || 'Details').trim(),
          content: (m[2] || '').replace(/\\n/g, '\n').replace(/\\"/g, '"').trim()
        }));

        const titleMatch = text.match(/"title"\s*:\s*"([^"]+)/);
        return {
          title: titleMatch ? titleMatch[1].trim() : 'Mentor Response',
          sections
        };
      }

      // Markdown-like fallback.
      const blocks = text.split(/\n(?=#+\s|\*\*[^*]+\*\*\s*$|\d+[.)]\s)/).map(s => s.trim()).filter(Boolean);
      if (blocks.length >= 2) {
        const sections = blocks.map((b, i) => {
          const lines = b.split('\n').filter(Boolean);
          const first = lines[0] || `Section ${i + 1}`;
          const heading = first
            .replace(/^#+\s*/, '')
            .replace(/^\*\*(.+)\*\*$/, '$1')
            .replace(/^\d+[.)]\s*/, '')
            .trim();
          return {
            heading: heading || `Section ${i + 1}`,
            content: lines.slice(1).join('\n').trim() || b
          };
        });

        return { title: 'Mentor Response', sections };
      }

      return null;
    }

    function extractFollowUpSectionContent(rawText) {
      const text = String(rawText || '');
      if (!text) return '';

      const exactSectionMatch = text.match(/"heading"\s*:\s*"Questions that can be asked as follow-ups"[\s\S]*?"content"\s*:\s*"([\s\S]*?)"\s*[,}\]]/i)
        || text.match(/Questions that can be asked as follow-ups[\s\S]*?"content"\s*:\s*"([\s\S]*)$/i);

      if (exactSectionMatch && exactSectionMatch[1]) {
        return exactSectionMatch[1]
          .replace(/\\n/g, '\n')
          .replace(/\\"/g, '"')
          .trim();
      }

      const qaPairs = [];
      const qaRegex = /(?:^|\n)\s*(?:[-*]|\d+[.)])?\s*(?:Q(?:uestion)?\s*[:\-]?\s*)?([^\n?]{8,180}\?)\s*(?:\n|$)\s*(?:A(?:nswer)?\s*[:\-]?\s*)?([^\n]{3,260})/gi;
      let m;
      while ((m = qaRegex.exec(text)) !== null) {
        const q = String(m[1] || '').trim();
        const a = String(m[2] || '').trim();
        if (q && a) qaPairs.push(`- **${q}**\n${a}`);
        if (qaPairs.length >= 8) break;
      }

      return qaPairs.join('\n');
    }

    function ensureModeSections(structured, modeId, rawText) {
      if (!structured || !Array.isArray(structured.sections)) return structured;
      const expectedHeading = {
        deepdive: 'Deep dive',
        interviewready: 'Interview-ready',
        followups: 'Follow-ups',
        quickrevision: 'Quick revision'
      }[modeId] || 'Deep dive';

      const first = structured.sections[0];
      if (!first) {
        return {
          title: structured.title || 'Mentor Response',
          sections: [{ heading: expectedHeading, content: String(rawText || '').trim() || 'No content returned.' }]
        };
      }

      return {
        title: structured.title || 'Mentor Response',
        sections: [{ heading: expectedHeading, content: first.content || '' }]
      };
    }

    function isLikelyTruncated(rawText, finishReason) {
      const t = String(rawText || '').trim();
      if (!t) return true;
      if (finishReason === 'length') return true;

      const openCurly = (t.match(/\{/g) || []).length;
      const closeCurly = (t.match(/\}/g) || []).length;
      const openSquare = (t.match(/\[/g) || []).length;
      const closeSquare = (t.match(/\]/g) || []).length;

      return openCurly > closeCurly || openSquare > closeSquare;
    }

    function getMode(modeId) {
      return MODE_OPTIONS.find(mode => mode.id === modeId) || MODE_OPTIONS[0];
    }

    function getModeMenuOrder() {
      const selected = getMode(activeMode);
      const others = MODE_OPTIONS.filter(mode => mode.id !== selected.id);
      return [...others, selected];
    }

    function renderModeMenu() {
      const ordered = getModeMenuOrder();
      modeMenuEl.innerHTML = ordered.map(mode => {
        const selectedClass = mode.id === activeMode ? 'selected' : '';
        return `<button type="button" class="mode-option ${selectedClass}" data-mode="${mode.id}">
          <span>${mode.icon}</span>
          <span>${mode.label}</span>
        </button>`;
      }).join('');
    }

    function updateModeChip() {
      const mode = getMode(activeMode);
      modeChipLabelEl.textContent = mode.label;
      modeDotEl.style.background = mode.color;
      modeDotEl.style.boxShadow = `0 0 0 4px ${mode.color}2b`;
      modeCards.forEach(card => {
        card.classList.toggle('active', card.dataset.mode === activeMode);
      });
    }

    function setMode(modeId) {
      if (!MODE_OPTIONS.some(mode => mode.id === modeId)) return;
      const previousMode = activeMode;
      activeMode = modeId;
      if (previousMode !== modeId) {
        history.length = 0;
      }
      updateModeChip();
      renderModeMenu();
    }

    function compactPromptContent(content, limit = 1400) {
      const text = String(content ?? '').trim();
      if (text.length <= limit) return text;
      return `${text.slice(0, limit - 1)}…`;
    }

    function buildPromptMessages() {
      const recentHistory = history.slice(-4).map((message) => ({
        role: message.role,
        content: compactPromptContent(message.content, message.role === 'assistant' ? 1200 : 1800)
      }));

      return [{ role: 'system', content: buildSystemPrompt(activeMode) }, ...recentHistory];
    }

    function buildMessagesForRequest(systemPrompt, includeHistory = true, pendingUserText = '') {
      if (!includeHistory) {
        return [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: String(pendingUserText || '').trim() }
        ].filter(msg => msg.content);
      }

      const recentHistory = history.slice(-4).map((message) => ({
        role: message.role,
        content: compactPromptContent(message.content, message.role === 'assistant' ? 1200 : 1800)
      }));

      return [{ role: 'system', content: systemPrompt }, ...recentHistory];
    }

    function showModeToast(text) {
      if (!modeToastEl) return;
      modeToastEl.textContent = text;
      modeToastEl.classList.add('show');

      if (toastTimer) {
        clearTimeout(toastTimer);
      }

      toastTimer = setTimeout(() => {
        modeToastEl.classList.remove('show');
      }, 2300);
    }

    function hideExplainSelectionButton() {
      explainSelectionBtnEl.classList.remove('show');
    }

    function getCurrentSelectedMessageText() {
      const selection = window.getSelection();
      if (!selection || selection.isCollapsed || selection.rangeCount === 0) return '';

      const selected = selection.toString().trim();
      if (!selected || selected.length < 2) return '';

      const range = selection.getRangeAt(0);
      const container = range.commonAncestorContainer.nodeType === 3
        ? range.commonAncestorContainer.parentNode
        : range.commonAncestorContainer;

      if (!container || !messagesEl.contains(container)) return '';
      return selected;
    }

    function updateExplainSelectionButton() {
      const selection = window.getSelection();
      if (!selection || selection.isCollapsed || selection.rangeCount === 0) {
        hideExplainSelectionButton();
        explainSelectedText = '';
        return;
      }

      const selected = getCurrentSelectedMessageText();
      if (!selected) {
        hideExplainSelectionButton();
        explainSelectedText = '';
        return;
      }

      const range = selection.getRangeAt(0);
      const container = range.commonAncestorContainer.nodeType === 3
        ? range.commonAncestorContainer.parentNode
        : range.commonAncestorContainer;

      if (!messagesEl.contains(container)) {
        hideExplainSelectionButton();
        explainSelectedText = '';
        return;
      }

      const rect = range.getBoundingClientRect();
      if (!rect || (!rect.width && !rect.height)) {
        hideExplainSelectionButton();
        explainSelectedText = '';
        return;
      }

      explainSelectedText = selected.slice(0, 700);

      const top = Math.max(10, rect.top - 34);
      const left = Math.max(12, Math.min(window.innerWidth - 12, rect.left + rect.width / 2));
      explainSelectionBtnEl.style.top = `${top}px`;
      explainSelectionBtnEl.style.left = `${left}px`;
      explainSelectionBtnEl.classList.add('show');
    }

    function coerceExplanationResponse(raw, parsed) {
      const structured = parsed || normalizeStructuredResponse(raw) || recoverStructuredFromText(raw);
      if (structured && Array.isArray(structured.sections) && structured.sections.length) {
        const explanationContent = structured.sections
          .map((s) => String(s.content || '').trim())
          .filter(Boolean)
          .join('\n\n');

        return {
          title: 'Explanation',
          sections: [{
            heading: 'Explanation',
            content: explanationContent || String(raw || '').trim()
          }]
        };
      }

      return {
        title: 'Explanation',
        sections: [{
          heading: 'Explanation',
          content: String(raw || '').replace(/```json|```/gi, '').trim()
        }]
      };
    }

    function toggleModeMenu(forceState) {
      const shouldOpen = typeof forceState === 'boolean'
        ? forceState
        : !modeSwitcherEl.classList.contains('open');

      modeSwitcherEl.classList.toggle('open', shouldOpen);
      modeChipEl.setAttribute('aria-expanded', String(shouldOpen));
    }

    /* ── Format rich text ── */
    function formatRichText(text) {
      if (!text) return '';

      text = String(text)
        .replace(/\r\n/g, '\n')
        .replace(/\\n/g, '\n')
        .replace(/\\t/g, ' ');

      const mathBlocks = [];
      // Extract block math
      text = text.replace(/\$\$([\s\S]+?)\$\$/g, (_, eq) => {
        mathBlocks.push({ type: 'block', eq });
        return `@@MATH_${mathBlocks.length - 1}@@`;
      });
      // Extract inline math
      text = text.replace(/(^|[^\\])\$([^$\n]+?)\$/g, (_, p1, eq) => {
        mathBlocks.push({ type: 'inline', eq });
        return `${p1}@@MATH_${mathBlocks.length - 1}@@`;
      });

      // Escape HTML
      let safe = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Code blocks (```lang\ncode```)
      safe = safe.replace(/```(\w*)\n?([\s\S]+?)```/g, (_, lang, code) => {
        const l = lang || 'code';
        const id = 'cb_' + Math.random().toString(36).slice(2,7);
        const hCode = escapeHtml(code.trim());
        return `<div class="code-block-wrap">
          <div class="code-block-header">
            <span class="code-block-lang">${l}</span>
            <button class="copy-btn" id="${id}" onclick="copyCode(this,'${id}')">Copy</button>
          </div>
          <pre><code class="language-${l}">${hCode}</code></pre>
        </div>`;
      });

      // Headings
      safe = safe.replace(/^###\s+(.+)$/gm, '<div class="md-h3">$1</div>');
      safe = safe.replace(/^##\s+(.+)$/gm,  '<div class="md-h2">$1</div>');
      safe = safe.replace(/^#\s+(.+)$/gm,   '<div class="md-h1">$1</div>');

      // Bold / italic
      safe = safe.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
      safe = safe.replace(/(^|\s)\*([^*\n]+?)\*(?=\s|$|[.,!?;:])/g, '$1<em>$2</em>');

      // Line breaks and lists
      const lines = safe.split('\n');
      let rendered = '';
      let listType = null;
      let listItems = [];

      const flushList = () => {
        if (!listType || listItems.length === 0) return;

        if (listType === 'bullet') {
          rendered += `<ul class="takeaway-list">` +
            listItems.map(item => `<li><span class="check">✓</span><span>${item}</span></li>`).join('') +
            `</ul>`;
        } else {
          rendered += `<ol class="step-list">` +
            listItems.map(item => `<li><span class="step-num"></span><span>${item}</span></li>`).join('') +
            `</ol>`;
        }

        listType = null;
        listItems = [];
      };

      lines.forEach(line => {
        const trimmed = line.trim();

        if (!trimmed) {
          flushList();
          rendered += '<br>';
          return;
        }

        const bulletMatch = trimmed.match(/^[-*•]\s+(.*)$/);
        const numberMatch = trimmed.match(/^\d+[.)]\s+(.*)$/);

        if (bulletMatch) {
          if (listType && listType !== 'bullet') flushList();
          listType = 'bullet';
          listItems.push(bulletMatch[1]);
          return;
        }

        if (numberMatch) {
          if (listType && listType !== 'number') flushList();
          listType = 'number';
          listItems.push(numberMatch[1]);
          return;
        }

        flushList();
        rendered += `${line}<br>`;
      });

      flushList();
      safe = rendered;

      // Restore math
      mathBlocks.forEach((m, i) => {
        if (m.type === 'block') {
          safe = safe.replace(`@@MATH_${i}@@`,
            `<div class="math-block">\\[${m.eq}\\]</div>`);
        } else {
          safe = safe.replace(`@@MATH_${i}@@`,
            `<span class="math-inline">\\(${m.eq}\\)</span>`);
        }
      });

      return safe;
    }

    function preprocessSectionContent(heading, content) {
      let text = String(content ?? '').replace(/\r\n/g, '\n').trim();
      if (!text) return text;

      const headingLower = String(heading || '').toLowerCase();
      const isFollowUp = headingLower.includes('follow-up') || headingLower.includes('follow up');

      if (isFollowUp) {
        text = text.replace(/\n{3,}/g, '\n\n');

        text = text.replace(
          /(?:^|\n)\s*(?:[-*]\s*)?(?:\d+[.)]\s*)?(?:Q(?:uestion)?\s*[:\-]\s*)?([^\n?]+\?)\s*(?:A(?:nswer)?\s*[:\-]\s*)?([^\n]+)/gi,
          (_m, q, a) => `\n- **${String(q).trim()}**\n${String(a || '').trim()}`
        );

        const lines = text.split('\n');
        const normalized = [];

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;

          const qMatch = line.match(/^(?:[-*]\s*)?\*\*(.+\?)\*\*$/);
          if (qMatch) {
            normalized.push(`- **${qMatch[1].trim()}**`);
            const next = (lines[i + 1] || '').trim();
            if (next) {
              normalized.push(
                next
                  .replace(/^(?:A(?:nswer)?\s*[:\-]\s*)/i, '')
                  .replace(/\*\*/g, '')   // REMOVE any bold from answers
                  .trim()
              );
              i += 1;
            }
            continue;
          }

          normalized.push(line);
        }

        text = normalized.join('\n');
      }

      const isDenseParagraph = !/\n/.test(text) && !/^\s*(?:[-*]|\d+[.)])\s+/.test(text);
      if (isDenseParagraph && text.length > 240) {
        const sentences = text.split(/(?<=[.!?])\s+(?=[A-Z(])/).map(s => s.trim()).filter(Boolean);
        if (sentences.length >= 3) {
          text = sentences.map(s => `- ${s}`).join('\n');
        }
      }

      return text;
    }

    const SECTION_THEME = [
      { bg: '#f8f8ff', border: '#c7d2fe', borderOpen: '#a5b4fc', headBg: '#eef2ff', pill: '#c7d2fe', icon: '①' },
      { bg: '#f1fbf8', border: '#99f6e4', borderOpen: '#5eead4', headBg: '#def7ee', pill: '#99f6e4', icon: '②' },
      { bg: '#fff7ef', border: '#fed7aa', borderOpen: '#fdba74', headBg: '#ffedd5', pill: '#fdba74', icon: '③' },
      { bg: '#fdf2f8', border: '#fbcfe8', borderOpen: '#f9a8d4', headBg: '#fce7f3', pill: '#f9a8d4', icon: '④' }
    ];

    /* ── Render structured response ── */
    function renderStructuredResponse(data) {
      const normalized = normalizeStructuredResponse(data);
      if (!normalized) {
        return `<div class="bubble-plain">${formatRichText(typeof data === 'string' ? data : JSON.stringify(data, null, 2))}</div>`;
      }

      normalized.sections.forEach((sec, i) => {
        sec._theme = SECTION_THEME[i % SECTION_THEME.length];
      });

      const sectionsHtml = normalized.sections.map(sec => {
        const theme = sec._theme || SECTION_THEME[0];
        const prettyContent = preprocessSectionContent(sec.heading, sec.content);
        return `<details class="section-accordion" open style="--sec-bg:${theme.bg};--sec-border:${theme.border};--sec-border-open:${theme.borderOpen};--sec-head-bg:${theme.headBg};--sec-pill:${theme.pill};">
          <summary class="section-summary">
            <div class="section-summary-left">
              <span class="section-badge">${theme.icon}</span>
              <span class="section-heading-text">${escapeHtml(sec.heading)}</span>
            </div>
            <span class="section-caret">▾</span>
          </summary>
          <div class="section-content">${formatRichText(prettyContent)}</div>
        </details>`;
      }).join('');

      const modeLabel = escapeHtml(getMode(activeMode).label);

      return `<div class="premium-card">
        <div class="card-header">
          <div class="card-header-eyebrow">SUBJECT: DATA SCIENCE</div>
          <div class="premium-title">${escapeHtml(normalized.title || '')}</div>
          <div class="card-header-meta">Mode: ${modeLabel}</div>
        </div>
        <div class="section-stack">${sectionsHtml}</div>
      </div>`;
    }

    /* ── Copy code ── */
    function copyCode(btn) {
      const pre = btn.closest('.code-block-wrap').querySelector('code');
      navigator.clipboard.writeText(pre.textContent).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    /* ── Auto grow textarea ── */
    function autoGrow() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    }
    inputEl.addEventListener('input', autoGrow);
    inputEl.addEventListener('keydown', evt => {
      if (evt.key === 'Enter' && !evt.shiftKey) { evt.preventDefault(); sendMessage(); }
    });

    modeChipEl.addEventListener('click', () => {
      toggleModeMenu();
    });

    modeMenuEl.addEventListener('click', evt => {
      const option = evt.target.closest('.mode-option[data-mode]');
      if (!option) return;
      setMode(option.dataset.mode);
      toggleModeMenu(false);
      inputEl.focus();
    });

    modeCards.forEach(card => {
      card.addEventListener('click', () => {
        setMode(card.dataset.mode);
        toggleModeMenu(false);
        inputEl.focus();
      });
    });

    document.addEventListener('click', evt => {
      if (!modeSwitcherEl.contains(evt.target)) {
        toggleModeMenu(false);
      }
    });

    document.addEventListener('keydown', evt => {
      if (evt.key === 'Escape') toggleModeMenu(false);
    });

    messagesEl.addEventListener('mouseup', () => {
      setTimeout(updateExplainSelectionButton, 0);
    });

    messagesEl.addEventListener('keyup', () => {
      setTimeout(updateExplainSelectionButton, 0);
    });

    document.addEventListener('selectionchange', () => {
      setTimeout(updateExplainSelectionButton, 0);
    });

    messagesEl.addEventListener('scroll', hideExplainSelectionButton);
    window.addEventListener('scroll', hideExplainSelectionButton, true);

    explainSelectionBtnEl.addEventListener('mousedown', (evt) => {
      // Keep current selection intact until click handler reads it.
      evt.preventDefault();
    });

    explainSelectionBtnEl.addEventListener('click', () => {
      const selected = (getCurrentSelectedMessageText() || explainSelectedText).trim();
      hideExplainSelectionButton();
      if (!selected || sendBtn.disabled) {
        showModeToast('Select some output text first, then tap ✦Explain.');
        return;
      }

      const selection = window.getSelection();
      if (selection) selection.removeAllRanges();

      sendMessage(`Explain ${selected}`, {
        forceExplanation: true,
        includeHistory: false
      });
    });

    /* ── Add message ── */
    function addMessage(role, text, loading = false) {
      if (introPanelEl && introPanelEl.isConnected) introPanelEl.remove();

      const row = document.createElement('div');
      row.className = `message ${role}`;

      if (role === 'bot') {
        if (loading) {
          row.innerHTML = `<div class="avatar bot-av">🧠</div>
            <div class="bubble">
              <div class="typing-row">
                <div class="typing-dots"><span></span><span></span><span></span></div>
                Preparing the best answer…
              </div>
            </div>`;
        } else {
          row.innerHTML = `<div class="avatar bot-av">🧠</div>
            <div class="bubble">${renderStructuredResponse(text)}</div>`;
        }
      } else {
        row.innerHTML = `<div class="avatar">You</div>
          <div class="bubble">${formatRichText(text)}</div>`;
      }

      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      if (!loading) {
        if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
          window.MathJax.typesetPromise([row]).catch(() => {});
        }
        if (typeof hljs !== 'undefined') {
          row.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
        }
      }

      return row;
    }

    /* ── Send message ── */
    async function sendMessage(overrideText = null, options = {}) {
      const text = (overrideText == null ? inputEl.value : String(overrideText)).trim();
      if (!text || sendBtn.disabled) return;

      const forceExplanation = !!options.forceExplanation;
      const includeHistory = options.includeHistory !== false;
      const requestSystemPrompt = forceExplanation ? EXPLANATION_SYSTEM_PROMPT : buildSystemPrompt(activeMode);

      hideExplainSelectionButton();

      if (includeHistory) {
        history.push({ role: 'user', content: text });
      }
      addMessage('user', text);
      if (overrideText == null) {
        inputEl.value = '';
        autoGrow();
      }
      sendBtn.disabled = true;
      const loadingRow = addMessage('bot', '', true);

      try {
        let response = await callGroqWithFallback({
          messages: buildMessagesForRequest(requestSystemPrompt, includeHistory, text),
          temperature: 0.5,
          max_tokens: 4200
        });

        let raw = response?.choices?.[0]?.message?.content?.trim();
        let finishReason = response?.choices?.[0]?.finish_reason;

        if (isLikelyTruncated(raw, finishReason)) {
          response = await callGroqWithFallback({
            messages: [
              ...buildMessagesForRequest(requestSystemPrompt, includeHistory, text),
              { role: 'user', content: 'Your previous output was cut off. Re-send the ENTIRE answer from scratch as one complete valid JSON object. Do not truncate.' }
            ],
            temperature: 0.4,
            max_tokens: 5200
          });
          raw = response?.choices?.[0]?.message?.content?.trim();
          finishReason = response?.choices?.[0]?.finish_reason;
        }

        let parsed = normalizeStructuredResponse(raw) || recoverStructuredFromText(raw);
        if (forceExplanation) {
          parsed = coerceExplanationResponse(raw, parsed);
        } else {
          parsed = ensureModeSections(parsed, activeMode, raw);
        }

        loadingRow.remove();
        if (raw) {
          if (includeHistory) {
            history.push({ role: 'assistant', content: raw });
          }
          addMessage('bot', parsed || { title: 'Mentor Response', sections: [{ heading: 'Details', content: String(raw).replace(/```json|```/gi, '').trim() }] });
        } else {
          addMessage('bot', 'I could not generate a response right now. Please try again.');
        }
      } catch (err) {
        loadingRow.remove();
        const msg = String(err?.message || 'Unknown model error');
        const friendly = msg.includes('model_not_supported') || msg.toLowerCase().includes('not supported')
          ? 'The current model configuration is not supported by your Groq account. I tried multiple fallbacks but none were accepted. Please update model names or API key access.'
          : 'Sorry, I hit an error while talking to the model. Please try again in a moment.';
        addMessage('bot', friendly);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    /* ── Groq with fallback ── */
    async function callGroqWithFallback(body) {
      let lastErr;
      for (const model of GROQ_MODELS) {
        try {
          const response = await fetch('/api/groq', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...body, model })
          });
          if (response.status === 429 || response.status === 503) {
            lastErr = new Error(`Rate limited on ${model}`);
            continue;
          }
          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            const errCode = errData?.error?.code || '';
            const errMessage = errData?.error?.message || `API error ${response.status}`;

            if (response.status === 400 && (errCode === 'model_not_supported' || /not supported/i.test(errMessage))) {
              lastErr = new Error(`model_not_supported: ${model}`);
              continue;
            }

            throw new Error(errMessage);
          }
          return await response.json();
        } catch (err) {
          lastErr = err;
          const errText = String(err?.message || '');
          if (!errText.includes('Rate limited') && !errText.includes('model_not_supported')) throw err;
        }
      }
      throw lastErr;
    }

    setMode(activeMode);
    inputEl.focus();
  </script>
</body>
