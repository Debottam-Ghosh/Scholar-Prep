<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask Mentor</title>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']]
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-a: #f8faff;
      --bg-b: #eef2ff;
      --panel: rgba(255,255,255,0.82);
      --panel-border: rgba(148,163,184,0.18);
      --text: #111827;
      --muted: #64748b;
      --accent: #6366f1;
      --accent-2: #8b5cf6;
      --user: linear-gradient(135deg, #6366f1, #8b5cf6);
      --bot: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(240,244,255,0.95));
      --shadow: 0 24px 60px rgba(99,102,241,0.18);
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(99,102,241,0.12), transparent 34%),
        radial-gradient(circle at 92% 12%, rgba(139,92,246,0.14), transparent 24%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
      overflow-x: hidden;
      overflow-y: auto;
    }
    .shell {
      min-height: 100vh;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 22px;
      gap: 16px;
    }
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .brand-mark {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 14px 28px rgba(99,102,241,0.28);
      flex-shrink: 0;
    }
    .brand-copy { min-width: 0; }
    .eyebrow {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 3px;
    }
    h1 {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .subtitle {
      font-size: 0.92rem;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.5;
    }
    .close-btn {
      border: none;
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 24px rgba(99,102,241,0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      flex-shrink: 0;
    }
    .close-btn:hover { transform: translateY(-1px); box-shadow: 0 14px 30px rgba(99,102,241,0.28); }
    .chat-frame {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 22px;
      padding-bottom: 26px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
    }
    .intro-panel {
      width: min(920px, 100%);
      margin: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 12px 0;
    }
    .intro-icon {
      width: 220px;
      height: 220px;
      object-fit: contain;
      filter: drop-shadow(0 14px 24px rgba(99,102,241,0.18));
    }
    .intro-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #000;
      text-align: center;
      line-height: 1.2;
      padding: 0 18px;
    }
    .intro-cards {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .intro-card {
      border: 1px solid rgba(99,102,241,0.18);
      border-radius: 18px;
      background:
        radial-gradient(circle at 88% 14%, rgba(99,102,241,0.08), transparent 46%),
        linear-gradient(140deg, rgba(255,255,255,0.95), rgba(240,244,255,0.92));
      padding: 16px 16px;
      box-shadow:
        0 14px 28px rgba(99,102,241,0.10),
        inset 0 1px 0 rgba(255,255,255,0.85);
      color: #111827;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.45;
      opacity: 0;
      transform: translateY(10px) scale(0.985);
      animation: introReveal 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      cursor: default;
    }
    .intro-card:nth-child(1) { animation-delay: 0.06s; }
    .intro-card:nth-child(2) { animation-delay: 0.20s; }
    .intro-card:nth-child(3) { animation-delay: 0.34s; }
    @keyframes introReveal {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .message {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: min(880px, 100%);
    }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 22px rgba(99,102,241,0.2);
      flex-shrink: 0;
    }
    .bubble {
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.65;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 10px 26px rgba(15,23,42,0.06);
    }
    .bubble .md-h1,
    .bubble .md-h2,
    .bubble .md-h3 {
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1.25;
      margin: 6px 0 8px;
    }
    .bubble .md-h1 { font-size: 1.28rem; }
    .bubble .md-h2 { font-size: 1.16rem; }
    .bubble .md-h3 { font-size: 1.06rem; }
    .bubble strong { font-weight: 800; }
    .bubble em { font-style: italic; }
    .math-block {
      margin: 8px 0;
      overflow-x: auto;
    }
    .math-inline {
      white-space: normal;
    }
    .message.user .bubble {
      background: var(--user);
      color: #fff;
      border-bottom-right-radius: 6px;
    }
    .message.bot .bubble {
      background: var(--bot);
      color: var(--text);
      border: 1px solid rgba(99,102,241,0.12);
      border-bottom-left-radius: 6px;
    }
    .composer {
      position: sticky;
      bottom: 0;
      z-index: 5;
      padding: 18px;
      border-top: 1px solid rgba(148,163,184,0.18);
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(10px);
    }
    .composer-inner {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      padding: 12px;
      border-radius: 22px;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(148,163,184,0.16);
      box-shadow: 0 12px 28px rgba(99,102,241,0.08);
    }
    textarea {
      flex: 1;
      border: none;
      resize: none;
      min-height: 56px;
      max-height: 180px;
      font: inherit;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      background: transparent;
      outline: none;
      padding: 10px 8px;
    }
    textarea::placeholder { color: #94a3b8; }
    .send-btn {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 22px rgba(99,102,241,0.24);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      flex-shrink: 0;
    }
    .send-btn:hover { transform: translateY(-1px); box-shadow: 0 14px 30px rgba(99,102,241,0.28); }
    .send-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .typing {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-style: italic;
    }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(99,102,241,0.18);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 900px) {
      .intro-cards { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .shell { padding: 14px; gap: 12px; }
      .messages { padding: 16px; }
      .messages { padding-bottom: 22px; }
      .composer { padding: 14px; }
      .bubble { font-size: 13px; }
      .intro-panel { padding: 8px 0; gap: 14px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="chat-frame">
      <div class="messages" id="messages">
        <div class="intro-panel" id="introPanel">
          <img class="intro-icon" src="../../../icons/mentor.png" alt="" />
          <div class="intro-title">How's your prep going?</div>
          <div class="intro-cards">
            <div class="intro-card">Got some doubt on a topic!</div>
            <div class="intro-card">Help me with some interview hacks</div>
            <div class="intro-card">Stresses about long term career prospect...</div>
          </div>
        </div>
      </div>
      <div class="composer">
        <div class="composer-inner">
          <textarea id="promptInput" placeholder="Ask anything about the topic..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" type="button" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const subjectLabel = params.get('subject') || 'Data Science';
    const messagesEl = document.getElementById('messages');
    const introPanelEl = document.getElementById('introPanel');
    const inputEl = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const history = [];
    const GROQ_MODELS = ['llama-3.3-70b-versatile', 'llama-3.1-70b-versatile', 'llama-3.1-8b-instant', 'gemma2-9b-it'];

    const systemPrompt = `You are Mentor, a warm, human, and highly capable teaching assistant for ${subjectLabel}.\n\nYour job is to teach, not just answer. Use a student-friendly tone that feels patient, natural, and supportive.\n\nRules for every answer:\n- Explain the main idea clearly before going into detail\n- Break the answer into small, understandable steps\n- Use intuitive examples and analogies\n- Be detailed enough that the student can actually learn from the response\n- If the question is ambiguous, say what assumption you are using\n- Mention common mistakes or misconceptions when helpful\n- Keep the tone encouraging, warm, and human\n- Prefer substance over brevity, unless the student asks for a short answer\n- End with a helpful takeaway or a next-step suggestion\n- Give mathematical formulae in latex\n\nWhen appropriate, you can ask a follow-up question back to the student to personalize the help.`;

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatRichText(text) {
      let safe = escapeHtml(text);

      // Markdown-like headings
      safe = safe.replace(/^###\s+(.+)$/gm, '<div class="md-h3">$1</div>');
      safe = safe.replace(/^##\s+(.+)$/gm, '<div class="md-h2">$1</div>');
      safe = safe.replace(/^#\s+(.+)$/gm, '<div class="md-h1">$1</div>');

      // Display math: $$ ... $$
      safe = safe.replace(/\$\$([\s\S]+?)\$\$/g, '<div class="math-block">\\[$1\\]</div>');

      // Inline math: $ ... $
      safe = safe.replace(/(^|[^\\])\$([^$\n]+?)\$/g, '$1<span class="math-inline">\\($2\\)</span>');

      // Bold and italic
      safe = safe.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
      safe = safe.replace(/(^|\s)\*([^*\n]+?)\*(?=\s|$|[.,!?;:])/g, '$1<em>$2</em>');

      // New lines
      safe = safe.replace(/\n/g, '<br>');

      return safe;
    }

    function addMessage(role, text, loading = false) {
      if (introPanelEl && introPanelEl.isConnected) {
        introPanelEl.remove();
      }
      const row = document.createElement('div');
      row.className = `message ${role}`;
      if (role === 'bot') {
        row.innerHTML = `<div class="avatar">🧠</div><div class="bubble">${loading ? '<span class="typing"><span class="spinner"></span>Preparing the best answer possible for you...</span>' : formatRichText(text)}</div>`;
      } else {
        row.innerHTML = `<div class="avatar">You</div><div class="bubble">${formatRichText(text)}</div>`;
      }
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      if (!loading && window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
        window.MathJax.typesetPromise([row]).catch(() => {});
      }

      return row;
    }

    function autoGrow() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    }

    inputEl.addEventListener('input', autoGrow);
    inputEl.addEventListener('keydown', evt => {
      if (evt.key === 'Enter' && !evt.shiftKey) {
        evt.preventDefault();
        sendMessage();
      }
    });

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || sendBtn.disabled) return;
      history.push({ role: 'user', content: text });
      addMessage('user', text);
      inputEl.value = '';
      autoGrow();
      sendBtn.disabled = true;
      const loadingRow = addMessage('bot', '', true);

      try {
        const response = await callGroqWithFallback({
          messages: [{ role: 'system', content: systemPrompt }, ...history],
          temperature: 0.7,
          max_tokens: 1200
        });
        const reply = response?.choices?.[0]?.message?.content?.trim();
        loadingRow.remove();
        if (reply) {
          history.push({ role: 'assistant', content: reply });
          addMessage('bot', reply);
        } else {
          addMessage('bot', 'I could not generate a response right now. Please try again.');
        }
      } catch (err) {
        loadingRow.remove();
        addMessage('bot', 'Sorry, I hit an error while talking to the model. Please try again in a moment.');
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    async function callGroqWithFallback(body) {
      let lastErr;
      for (const model of GROQ_MODELS) {
        try {
          const response = await fetch('/api/groq', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...body, model })
          });
          if (response.status === 429 || response.status === 503) {
            lastErr = new Error(`Rate limited on ${model}`);
            continue;
          }
          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error?.message || `API error ${response.status}`);
          }
          return await response.json();
        } catch (err) {
          lastErr = err;
          if (!String(err.message || '').includes('Rate limited')) throw err;
        }
      }
      throw lastErr;
    }

    inputEl.focus();
  </script>
</body>
</html>
