<style>

  <div class="filter-title-row">
    <div class="filter-title">Filter by difficulty</div>
    <button type="button" class="info-tip" aria-label="Difficulty filter help">🛈
      <span class="info-pop">If a parent question is filtered out but it has follow-ups matching selected difficulties, that card is still shown so those matching follow-ups are accessible.</span>
    </button>
  </div>
  <div class="difficulty-filters" id="difficultyFilters"></div>

  <button class="ask-mentor-btn" id="askMentorBtn" type="button" title="Ask Mentor"><span class="ask-mentor-icon">💬</span><span class="ask-mentor-text">Ask Mentor</span></button>

<script>
const SUBJECT = 'Linear Algebra';
let data = [];
let currentTopic = 'all';
const difficultyOptions = ['basic', 'medium', 'hard'];
let activeDifficulties = new Set(difficultyOptions);
let copyToastTimer = null;

function escapeForAttr(text) {
  return String(text || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\r?\n/g, ' ');
}

function ensureCopyToast() {
  let toast = document.getElementById('copyToast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'copyToast';
    toast.className = 'copy-toast';
    toast.textContent = 'Copied!';
    document.body.appendChild(toast);
  }
  return toast;
}

function showCopyToast() {
  const toast = ensureCopyToast();
  toast.classList.add('show');
  clearTimeout(copyToastTimer);
  copyToastTimer = setTimeout(() => toast.classList.remove('show'), 1100);
}

async function copyText(event, text) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  try {
    await navigator.clipboard.writeText(text);
  } catch (err) {
    const tmp = document.createElement('textarea');
    tmp.value = text;
    document.body.appendChild(tmp);
    tmp.select();
    document.execCommand('copy');
    document.body.removeChild(tmp);
  }
  showCopyToast();
}

async function loadData() {
  const res = await fetch('../data/questions_data_updated.json');
  const json = await res.json();
  const subjectData = json.find(s => s.subject === SUBJECT);
  if (!subjectData) return;
  // Group questions by topic
  const topicMap = new Map();
  subjectData.questions.forEach(q => {
    const normalizedFollowups = (q.followups || []).map(f => {
      if (typeof f === 'string') {
        return { text: f, d: q.difficulty || 'medium' };
      }
      return { text: f.text || '', d: f.difficulty || q.difficulty || 'medium' };
    }).filter(f => f.text);
    if (!topicMap.has(q.topic)) topicMap.set(q.topic, []);
    topicMap.get(q.topic).push({ q: q.text, d: q.difficulty, fu: normalizedFollowups, hint: q.hint || '' });
  });
  data = Array.from(topicMap.entries()).map(([label, qs]) => ({
    topic: label.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, ''),
    topicLabel: label,
    qs
  }));
  buildTabs();
  renderDifficultyFilters();
  renderQuestions();
}

function renderDifficultyFilters() {
  const container = document.getElementById('difficultyFilters');
  container.innerHTML = '';
  difficultyOptions.forEach(level => {
    const chip = document.createElement('button');
    chip.className = `diff-chip ${level}${activeDifficulties.has(level) ? ' active' : ''}`;
    chip.type = 'button';
    chip.textContent = level;
    chip.onclick = () => toggleDifficulty(level);
    container.appendChild(chip);
  });
}

function toggleDifficulty(level) {
  if (activeDifficulties.has(level)) {
    if (activeDifficulties.size === 1) return;
    activeDifficulties.delete(level);
  } else {
    activeDifficulties.add(level);
  }
  renderDifficultyFilters();
  renderQuestions();
}

function buildTabs() {
  const container = document.getElementById('tabsContainer');
  container.innerHTML = '<div class="tab active" onclick="showTab(\'all\',this)">All topics</div>';
  data.forEach(s => {
    const shortLabel = s.topicLabel.replace(/&/g, '&amp;').split(/\s+/).slice(0, 3).join(' ');
    container.innerHTML += `<div class="tab" onclick="showTab('${s.topic}',this)">${shortLabel}</div>`;
  });
}

function showTab(topic, el){
  currentTopic = topic;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderQuestions();
}

function renderQuestions(){
  const bank = document.getElementById('qbank');
  bank.innerHTML = '';
  let qIndex = 0;
  const colors = {basic:'d-basic',medium:'d-medium',hard:'d-hard'};
  const numColors = ['#534AB7','#0F6E56','#993C1D','#993556','#185FA5','#3B6D11','#854F0B'];
  const numBg = ['#EEEDFE','#E1F5EE','#FAECE7','#FBEAF0','#E6F1FB','#EAF3DE','#FAEEDA'];

  data.forEach((section, si) => {
    if(currentTopic !== 'all' && section.topic !== currentTopic) return;
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `<div class="section-title">${section.topicLabel}</div>`;
    section.qs.forEach((item, qi) => {
      const visibleFollowups = (item.fu || []).filter(f => activeDifficulties.has(f.d || 'medium'));
      const parentVisible = activeDifficulties.has(item.d);
      if (!parentVisible && visibleFollowups.length === 0) return;
      qIndex++;
      const ci = si % numColors.length;
      const card = document.createElement('div');
      card.className = 'qcard';
      const bodyId = `body-${si}-${qi}`;
      const arrowId = `arrow-${si}-${qi}`;
      let fuHtml = '';
      if(visibleFollowups.length){
        fuHtml += `<div class="followup-label">Follow-up probes</div>`;
        visibleFollowups.forEach((fobj, fi) => {
          const fText = fobj.text;
          const fCopy = escapeForAttr(fText);
          const fDiff = fobj.d || 'medium';
          const fuPractId = `fupract-${si}-${qi}-${fi}`;
          fuHtml += `<div class="followup" onclick="openPractice('${fuPractId}',null)"><span class="followup-text">↳ ${fText}</span><button type="button" class="q-copy-btn" title="Copy follow-up" onclick="copyText(event,'${fCopy}')">📋</button><span class="difficulty ${colors[fDiff] || colors.medium}">${fDiff}</span></div>`;
          fuHtml += `<div class="fu-practice"><div class="practice-area" id="${fuPractId}" data-question="${fText.replace(/"/g,'&quot;')}" data-subject="${SUBJECT}"><textarea placeholder="Type your answer here..."></textarea><div class="practice-buttons"><button class="practice-submit" onclick="submitPractice('${fuPractId}')">Submit Answer</button><button class="mic-btn" onclick="toggleVoice('${fuPractId}')">🎤 Speak</button></div><div class="mic-status" id="mic-status-${fuPractId}"></div><div class="eval-container"></div></div></div>`;
        });
      }
      const practiceId = `pract-${si}-${qi}`;
      const hintId = `hint-${si}-${qi}`;
      const hintBtnHtml = item.hint ? `<button class="hint-btn" onclick="document.getElementById('${hintId}').classList.toggle('visible')">💡Hint</button>` : '';
      const hintContentHtml = item.hint ? `<div class="hint-content" id="${hintId}"><div class="hint-label">Professor's note</div><div class="hint">${item.hint}</div></div>` : '';
      const practiceHtml = `<div class="practice-area visible" id="${practiceId}" data-question="${item.q.replace(/"/g,'&quot;')}" data-subject="${SUBJECT}"><textarea placeholder="Type your answer here..."></textarea><div class="practice-buttons"><button class="practice-submit" onclick="submitPractice('${practiceId}')">Submit Answer</button><button class="mic-btn" onclick="toggleVoice('${practiceId}')">🎤 Speak</button>${hintBtnHtml}</div>${hintContentHtml}<div class="mic-status" id="mic-status-${practiceId}"></div><div class="eval-container"></div></div>`;
      const qCopy = escapeForAttr(item.q);
      card.innerHTML = `
        <div class="qcard-header" onclick="toggle('${bodyId}','${arrowId}')">
          <div class="qnum" style="background:${numBg[ci]};color:${numColors[ci]}">${qIndex}</div>
          <div class="q-text">${item.q}</div>
          <button type="button" class="q-copy-btn" title="Copy question" onclick="copyText(event,'${qCopy}')">📋</button>
          <div class="difficulty ${colors[item.d]}">${item.d}</div>
          <div class="arrow" id="${arrowId}">▶</div>
        </div>
        <div class="qcard-body" id="${bodyId}">
          ${practiceHtml}${fuHtml}
        </div>`;
      sec.appendChild(card);
    });
    bank.appendChild(sec);
  });
}

function toggle(bodyId, arrowId){
  const body = document.getElementById(bodyId);
  const arrow = document.getElementById(arrowId);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

// ===== Practice & Evaluation =====
const GROQ_MODELS = ['llama-3.3-70b-versatile', 'llama-3.1-70b-versatile', 'llama-3.1-8b-instant', 'gemma2-9b-it'];

// ===== VOICE INPUT (Web Speech API live + Whisper final) =====
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const hasWebSpeech = !!SpeechRecognition;
const voiceState = {}; // per-area state keyed by practiceId

function toggleVoice(id) {
  if (voiceState[id] && voiceState[id].active) {
    stopVoice(id);
  } else {
    startVoice(id);
  }
}

async function startVoice(id) {
  const area = document.getElementById(id);
  const ta = area.querySelector('textarea');
  const micBtn = area.querySelector('.mic-btn');
  const micStatus = document.getElementById('mic-status-' + id);
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    micStatus.textContent = 'Microphone access denied.';
    return;
  }
  const state = { active: true, recognition: null, recorder: null, chunks: [], textBefore: ta.value, stream };
  voiceState[id] = state;
  // MediaRecorder for Whisper
  state.recorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
  state.recorder.ondataavailable = e => { if (e.data.size > 0) state.chunks.push(e.data); };
  state.recorder.onstop = async () => {
    stream.getTracks().forEach(t => t.stop());
    const blob = new Blob(state.chunks, { type: 'audio/webm' });
    await finalizeWhisper(id, blob);
  };
  state.recorder.start();
  // Web Speech API for live preview
  if (hasWebSpeech) {
    state.recognition = new SpeechRecognition();
    state.recognition.continuous = true;
    state.recognition.interimResults = true;
    state.recognition.lang = 'en-US';
    state.recognition.onresult = (event) => {
      let interim = '', final = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) final += event.results[i][0].transcript;
        else interim += event.results[i][0].transcript;
      }
      if (final) state.textBefore = state.textBefore ? state.textBefore + ' ' + final : final;
      ta.value = interim ? (state.textBefore ? state.textBefore + ' ' + interim : interim) : state.textBefore;
    };
    state.recognition.onerror = () => {};
    state.recognition.onend = () => { if (state.active) try { state.recognition.start(); } catch(e) {} };
    try { state.recognition.start(); } catch(e) {}
  }
  micBtn.classList.add('recording');
  micBtn.innerHTML = '<span class="mic-dot"></span> Listening...';
  micStatus.textContent = hasWebSpeech ? 'Speak now \u2014 live preview active' : 'Speak now \u2014 Whisper will transcribe after stop';
}

function stopVoice(id) {
  const state = voiceState[id];
  if (!state) return;
  const area = document.getElementById(id);
  const micBtn = area.querySelector('.mic-btn');
  const micStatus = document.getElementById('mic-status-' + id);
  state.active = false;
  if (state.recognition) try { state.recognition.stop(); } catch(e) {}
  if (state.recorder && state.recorder.state !== 'inactive') state.recorder.stop();
  micBtn.classList.remove('recording');
  micBtn.innerHTML = '\ud83c\udfa4 Speak';
  micStatus.textContent = 'Finalizing with Whisper...';
}

async function finalizeWhisper(id, blob) {
  const area = document.getElementById(id);
  const ta = area.querySelector('textarea');
  const micStatus = document.getElementById('mic-status-' + id);
  try {
    const fd = new FormData();
    fd.append('file', blob, 'recording.webm');
    fd.append('model', 'whisper-large-v3-turbo');
    fd.append('response_format', 'json');
    const res = await fetch('/api/transcribe', {
      method: 'POST',
      body: fd
    });
    if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error?.message || `API error ${res.status}`); }
    const data = await res.json();
    const text = (data.text || '').trim();
    if (text) { ta.value = text; micStatus.textContent = 'Whisper transcription ready. Review and submit.'; }
    else { micStatus.textContent = 'No speech detected. Using live preview text.'; }
  } catch (err) {
    micStatus.textContent = 'Whisper failed. Using live preview text.';
  }
}

async function callGroqWithFallback(body) {
  let lastErr;
  for (const model of GROQ_MODELS) {
    try {
      const response = await fetch('/api/groq', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ ...body, model })
      });
      if (response.status === 429 || response.status === 503) { lastErr = new Error(`Rate limited on ${model}`); continue; }
      if (!response.ok) { const errData = await response.json().catch(() => ({})); throw new Error(errData.error?.message || `API error ${response.status}`); }
      return await response.json();
    } catch (err) { lastErr = err; if (!err.message.includes('Rate limited')) throw err; }
  }
  throw lastErr;
}

function openPractice(id, btn) {
  const area = document.getElementById(id);
  const visible = area.classList.contains('visible');
  area.classList.toggle('visible', !visible);
  if (btn) btn.textContent = visible ? 'Practice this question ↗' : 'Close practice ✕';
  if (!visible) area.querySelector('textarea').focus();
}

async function submitPractice(id) {
  const area = document.getElementById(id);
  const ta = area.querySelector('textarea');
  const answer = ta.value.trim();
  if (!answer) return;
  const question = area.dataset.question;
  const subject = area.dataset.subject;
  const submitBtn = area.querySelector('.practice-submit');
  const container = area.querySelector('.eval-container');

  submitBtn.disabled = true;
  container.innerHTML = '<div class="eval-loading"><div class="eval-spinner"></div>Evaluating your answer...</div>';

  try {
    const result = await callGroqEvaluate(question, answer, subject);
    const score = Math.max(0, Math.min(10, parseInt(result.score) || 0));
    const scoreClass = score >= 7 ? 'high' : score >= 4 ? 'mid' : 'low';
    container.innerHTML = `
      <div class="eval-result">
        <div class="eval-score ${scoreClass}">★ Score: ${score}/10</div>
        ${result.feedback ? `<div class="eval-feedback">${result.feedback}</div>` : ''}
        <div class="eval-ideal"><strong>Ideal Answer</strong>${result.idealAnswer || ''}</div>
      </div>`;
  } catch (err) {
    container.innerHTML = `<div class="eval-result" style="border-left-color:#ef4444;background:linear-gradient(135deg,#fef2f2,#fee2e2)"><div style="color:#991b1b;font-size:13px">Evaluation failed: ${err.message}</div></div>`;
  }
  submitBtn.disabled = false;
}

async function callGroqEvaluate(question, userAnswer, subject) {
  const systemPrompt = `You are an expert ${subject} professor evaluating a student's answer in a PhD interview setting.
Evaluate the answer to the given question. Return ONLY valid JSON with exactly these keys:
- "score": integer 0-10
- "idealAnswer": a concise ideal answer (3-5 sentences max)
- "feedback": brief one-line feedback on the student's answer
Do NOT include any text outside the JSON object.`;
  const data = await callGroqWithFallback({
    messages: [
      { role: 'system', content: systemPrompt },
      { role: 'user', content: `Question: ${question}\nStudent's Answer: ${userAnswer}` }
    ],
    temperature: 0.3, max_tokens: 500
  });
  return safeParseJSON(data.choices[0].message.content);
}

function safeParseJSON(text) {
  const clean = text.trim();
  try { return JSON.parse(clean); } catch(e) {}
  const match = clean.match(/```(?:json)?\s*([\s\S]*?)```/) || clean.match(/(\{[\s\S]*\})/);
  if (match) { try { return JSON.parse(match[1].trim()); } catch(e) {} }
  throw new Error('Could not parse API response as JSON');
}

function openMentorWindow() {
  const mentorUrl = new URL('../mentor/index.html', window.location.href);
  mentorUrl.searchParams.set('subject', 'Linear Algebra');
  window.open(mentorUrl.toString(), '_blank');
}

document.getElementById('askMentorBtn').addEventListener('click', openMentorWindow);
